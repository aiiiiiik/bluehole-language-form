<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

  .header { width: 100%; max-width: 640px; padding: 16px 0 8px; display: flex; align-items: center; gap: 10px; }
  .header-logo { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .header-logo img { width: 100%; height: 100%; object-fit: contain; }
  .header-title { font-size: 14px; font-weight: 600; color: #222; }
  .header-sub { font-size: 12px; color: #888; }

  .chat-window { width: 100%; max-width: 640px; background: #fff; border-radius: 16px; border: 1px solid #e5e5e5; overflow: hidden; display: flex; flex-direction: column; min-height: 480px; max-height: 75vh; }
  .chat-body { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }

  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.bot { flex-direction: row; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
  .avatar span { color: #fff; font-size: 11px; font-weight: 700; }

  .bubble { max-width: 78%; padding: 10px 14px; font-size: 13.5px; line-height: 1.65; border-radius: 18px; word-break: keep-all; }
  .bubble.bot { background: #f0f0f0; color: #1a1a1a; border-bottom-left-radius: 4px; }
  .bubble.user { background: #222; color: #fff; border-bottom-right-radius: 4px; }
  .bubble small { font-size: 11.5px; color: #888; display: block; margin-top: 4px; }
  .bubble.user small { color: #aaa; }

  .options-area { padding: 10px 16px 4px; display: flex; flex-wrap: wrap; gap: 8px; }
  .opt { background: #fff; border: 1.5px solid #ddd; border-radius: 20px; padding: 7px 16px; font-size: 13px; cursor: pointer; color: #222; transition: all 0.15s; white-space: nowrap; }
  .opt:hover { border-color: #222; background: #f9f9f9; }

  .input-area { padding: 10px 16px 4px; display: flex; gap: 8px; }
  .input-area input, .input-area select { flex: 1; border: 1.5px solid #ddd; border-radius: 10px; padding: 9px 12px; font-size: 13px; color: #222; background: #fff; outline: none; font-family: inherit; }
  .input-area input:focus, .input-area select:focus { border-color: #222; }
  .input-area button { background: #222; color: #fff; border: none; border-radius: 10px; padding: 9px 16px; font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .input-area button:hover { background: #444; }

  .summary-area { padding: 10px 16px; }
  .summary-card { background: #f8f8f8; border-radius: 12px; border: 1px solid #e5e5e5; padding: 14px 16px; font-size: 13px; }
  .summary-card .title { font-weight: 600; font-size: 13.5px; margin-bottom: 10px; color: #222; }
  .summary-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; color: #444; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .lbl { color: #888; flex-shrink: 0; margin-right: 12px; }
  .summary-row .val { text-align: right; color: #222; font-weight: 500; word-break: keep-all; }
  .submit-btn { width: 100%; margin-top: 10px; background: #222; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600; }
  .submit-btn:hover { background: #444; }

  .done-area { padding: 10px 16px; }
  .done-card { background: #f0faf4; border-radius: 12px; border: 1px solid #b7e4c7; padding: 16px; font-size: 13.5px; color: #1a6636; line-height: 1.7; }
  .done-card strong { font-size: 15px; display: block; margin-bottom: 6px; }

  .typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: #f0f0f0; border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  .notice { font-size: 11.5px; color: #aaa; text-align: center; padding: 8px 16px 16px; }
</style>
</head>

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function botSay(html, ms=400) {
  const t = addTyping(); await delay(ms); t.remove(); addBotBubble(html);
}

function makeOpts(items, cb) {
  const wrap = document.createElement('div'); wrap.className = 'options-area';
  items.forEach(item => {
    const btn = document.createElement('button'); btn.className = 'opt'; btn.textContent = item;
    btn.onclick = () => { wrap.remove(); addUserBubble(item); cb(item); };
    wrap.appendChild(btn);
  });
  chatBody.appendChild(wrap); scrollDown();
}

function makeInput(placeholder, cb, type='text') {
  const wrap = document.createElement('div'); wrap.className = 'input-area';
  const inp = document.createElement('input'); inp.placeholder = placeholder; inp.type = type;
  const btn = document.createElement('button'); btn.textContent = '확인 →';
  btn.onclick = () => { const v = inp.value.trim(); if (!v) { inp.style.borderColor='#e44'; return; } wrap.remove(); addUserBubble(v); cb(v); };
  inp.addEventListener('keydown', e => { if (e.key==='Enter') btn.click(); });
  wrap.appendChild(inp); wrap.appendChild(btn); chatBody.appendChild(wrap); scrollDown();
  setTimeout(()=>inp.focus(), 100);
}

function makeSelect(options, placeholder, cb) {
  const wrap = document.createElement('div'); wrap.className = 'input-area';
  const sel = document.createElement('select');
  sel.innerHTML = `<option value="">-- ${placeholder} --</option>` + options.map(o=>`<option value="${o}">${o}</option>`).join('');
  const btn = document.createElement('button'); btn.textContent = '확인 →';
  btn.onclick = () => { const v = sel.value; if (!v) { sel.style.borderColor='#e44'; return; } wrap.remove(); addUserBubble(v); cb(v); };
  wrap.appendChild(sel); wrap.appendChild(btn); chatBody.appendChild(wrap); scrollDown();
}

async function start() {
  await botSay('안녕하세요! 👋<br>블루홀스튜디오 <b>외국어교육 신청 챗봇</b>입니다.<br>신청할 교육기관을 선택해 주세요.', 600);
  makeOpts(['당근영어','튜터링','링글','시원스쿨','스픽'], async (v) => { state.agency = v; await askType(); });
}

async function askType() {
  const types = state.agency === '시원스쿨'
    ? ['신규 신청','과정 변경','동일 과정 신청','수강 취소']
    : ['신규 신청','과정 변경','수강 취소'];
  await botSay('접수 유형을 선택해 주세요.');
  makeOpts(types, async (v) => { state.type = v; await askPersonal(); });
}

async function askPersonal() {
  if (state.type === '수강 취소') {
    await botSay('취소 신청을 진행할게요.<br>이름을 입력해 주세요.');
    makeInput('홍길동', async (v) => { state.name = v;
      await botSay('사내 메일 계정을 입력해 주세요.<br><small>예: abcde@bluehole.com</small>');
      makeInput('abcde@bluehole.com', async (v2) => { state.email = v2; await showSummary(); });
    });
  } else {
    await botSay('이름을 입력해 주세요.');
    makeInput('홍길동', async (v) => { state.name = v;
      await botSay('사번을 입력해 주세요.<small>예: BHS12345</small>');
      makeInput('BHS12345', async (v2) => { state.empId = v2;
        await botSay('사내 메일 계정을 입력해 주세요.<small>예: abcde@bluehole.com</small>');
        makeInput('abcde@bluehole.com', async (v3) => { state.email = v3;
          await botSay('휴대폰 번호를 입력해 주세요.<small>예: 010-1234-5678</small>');
          makeInput('010-1234-5678', async (v4) => { state.phone = v4; await askCourse(); });
        });
      });
    });
  }
}

async function askCourse() {
  const ag = state.agency;
  if (ag === '링글') {
    await botSay('수강 희망 과정을 선택해 주세요.');
    makeOpts(DATA.링글.courses, async (v) => { state.course = v; await showSummary(); });
  } else if (ag === '스픽') {
    await botSay('수강 희망 과정을 선택해 주세요. <small>(월 20회)</small>');
    makeOpts(DATA.스픽.courses, async (v) => { state.course = v; await showSummary(); });
  } else if (ag === '튜터링') {
    await botSay('수강 희망 과정을 선택해 주세요.');
    makeOpts(DATA.튜터링.courses, async (v) => { state.course = v;
      const times = v.includes('Native') ? DATA.튜터링.times.native : DATA.튜터링.times.global;
      await botSay('학습 시간을 선택해 주세요.');
      makeOpts(times, async (t) => { state.time = t; await showSummary(); });
    });
  } else if (ag === '시원스쿨') {
    await botSay('희망 언어를 선택해 주세요.');
    makeOpts(DATA.시원스쿨.languages, async (lang) => { state.language = lang;
      await botSay(`${lang} 강의를 선택해 주세요.`);
      makeSelect(DATA.시원스쿨.courses[lang], '강의 선택', async (c) => { state.course = c; await showSummary(); });
    });
  } else if (ag === '당근영어') {
    await botSay('학습 방식을 선택해 주세요.');
    makeOpts(DATA.당근영어.methods, async (method) => { state.method = method;
      const courseMap = DATA.당근영어.courses[method];
      const langKeys = Object.keys(courseMap);
      await botSay('언어/과정 종류를 선택해 주세요.');
      const labelToKey = {};
      langKeys.forEach(k => {
        const label = k.replace('영어원어민','영어 (원어민)').replace('영어필리핀','영어 (필리핀)').replace(/^Writing/, 'Writing - ');
        labelToKey[label] = k;
      });
      const labels = Object.keys(labelToKey);
      makeOpts(labels, async (sel) => {
        const key = labelToKey[sel];
        state.langGroup = sel;
        const detailCourses = courseMap[key];
        await botSay('상세 과정을 선택해 주세요.');
        makeSelect(detailCourses, '과정 선택', async (c) => { state.course = c;
          if (method !== 'Writing (첨삭 과정)') {
            const isKorean = key === '한국어';
            const times = isKorean ? DATA.당근영어.times.한국어 : DATA.당근영어.times.일반;
            await botSay('학습 시간을 선택해 주세요.');
            makeOpts(times, async (t) => { state.time = t;
              await botSay('희망 수업 시간대를 입력해 주세요.<small>예: 오전 10시~11시</small>');
              makeInput('오전 10시~11시', async (tw) => { state.timeWish = tw;
                await botSay('수강 난이도를 선택해 주세요.');
                makeOpts(DATA.당근영어.levels, async (lv) => { state.level = lv;
                  if (key === '영어원어민' || key === '영어필리핀') {
                    await botSay('AI 영어회화 앱 <b>말랑톡</b> 사용을 희망하시나요?<small>영어 전용 · 추가비용 3~4만원 발생 (잔여 지원금에서 차감)</small>');
                    makeOpts(['예','아니오'], async (mt) => { state.mallangtok = mt; await showSummary(); });
                  } else { await showSummary(); }
                });
              });
            });
          } else {
            await showSummary();
          }
        });
      });
    });
  }
}

async function showSummary() {
  await botSay('아래 내용을 확인해 주세요.');
  const isCancel = state.type === '수강 취소';
  const rows = [
    ['교육기관', state.agency],
    ['접수 유형', state.type],
    ['이름', state.name],
    ...(!isCancel ? [['사번', state.empId]] : []),
    ['메일', state.email],
    ...(!isCancel ? [['휴대폰', state.phone]] : []),
    ...(state.method ? [['학습 방식', state.method]] : []),
    ...(state.language ? [['언어', state.language]] : []),
    ...(state.langGroup ? [['언어/종류', state.langGroup]] : []),
    ...(state.course ? [['수강 과정', state.course]] : []),
    ...(state.time ? [['학습 시간', state.time]] : []),
    ...(state.timeWish ? [['희망 시간대', state.timeWish]] : []),
    ...(state.level ? [['난이도', state.level]] : []),
    ...(state.mallangtok ? [['말랑톡', state.mallangtok]] : []),
  ];

  const card = document.createElement('div'); card.className = 'summary-area';
  card.innerHTML = `<div class="summary-card">
    <div class="title">📋 입력 내용 확인</div>
    ${rows.map(([l,v])=>`<div class="summary-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join('')}
  </div>`;

  const submitBtn = document.createElement('button'); submitBtn.className = 'submit-btn'; submitBtn.textContent = '제출하기 →';
  submitBtn.onclick = async () => { submitBtn.disabled = true; submitBtn.textContent = '제출 중...'; await submitData(rows); card.remove(); };
  card.appendChild(submitBtn);
  chatBody.appendChild(card); scrollDown();
}

async function submitData(rows) {
  if (WEBHOOK_URL) {
    try {
      const params = new URLSearchParams();
      rows.forEach(([k,v]) => params.append(k.replace('/',''), v));
      await new Promise(resolve => {
        const img = new Image();
        img.onload = img.onerror = resolve;
        img.src = WEBHOOK_URL + '?' + params.toString();
      });
    } catch(e) { console.error(e); }
  }
  const done = document.createElement('div'); done.className = 'done-area';
  const isCancel = state.type === '수강 취소';
  done.innerHTML = `<div class="done-card"><strong>✅ ${isCancel ? '취소 접수가 완료되었습니다!' : '신청이 완료되었습니다!'}</strong>
    접수해 주셔서 감사합니다. ${isCancel ? '수강 취소는 <b>다음 달 1일부터 반영</b>됩니다.' : '신청하신 과정은 <b>다음 달 1일부터 반영</b>될 예정입니다.'}<br><br>
    문의: <b>#ask-bluehole-hr</b> (Slack)</div>`;
  chatBody.appendChild(done); scrollDown();
}

function getThirdWeekMonFri(year, month) {
  const firstDay = new Date(year, month, 1).getDay();
  const offset = firstDay === 0 ? 1 : firstDay === 1 ? 0 : 8 - firstDay;
  const firstMon = 1 + offset;
  const thirdMon = firstMon + 14;
  const thirdFri = thirdMon + 4;
  return {
    start: new Date(year, month, thirdMon, 0, 0, 0),
    end: new Date(year, month, thirdFri, 23, 59, 59)
  };
}

function getNextPeriodLabel() {
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth();
  const cur = getThirdWeekMonFri(y, m);
  if (now > cur.end) { m += 1; if (m > 11) { m = 0; y += 1; } }
  const next = getThirdWeekMonFri(y, m);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${y}년 ${next.start.getMonth()+1}월 셋째 주 (${fmt(next.start)} ~ ${fmt(next.end)})`;
}

function isInPeriod() {
  const now = new Date();
  const { start, end } = getThirdWeekMonFri(now.getFullYear(), now.getMonth());
  return now >= start && now <= end;
}

if (true || isInPeriod()) {
  start();
} else {
  const nextLabel = getNextPeriodLabel();
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;gap:12px;';
  wrap.innerHTML = `
    <div style="font-size:36px;">🔒</div>
    <div style="font-size:16px;font-weight:600;color:#222;">현재 접수 기간이 아닙니다</div>
    <div style="font-size:13px;color:#888;line-height:1.7;">외국어교육 신청은 매월 셋째 주 월~금에만 가능합니다.<br>
    <b style="color:#1a6bbf;">다음 접수 기간: ${nextLabel}</b></div>
    <div style="font-size:12px;color:#aaa;margin-top:8px;">문의: #ask-bluehole-hr (Slack)</div>
  `;
  document.getElementById('chatBody').appendChild(wrap);
}
</script>
